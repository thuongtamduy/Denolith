services:
  postgres:
    image: postgres:18-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: denolith
      POSTGRES_PASSWORD: denolith_password
      POSTGRES_DB: denolith_db
    volumes:
      - denolith_local_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U denolith -d denolith_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - denolith_network

  redis:
    image: redis:7.4.9
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - denolith_local_redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    sysctls:
      - net.core.somaxconn=1024
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - denolith_network

volumes:
  denolith_local_postgres_data:
  denolith_local_redis_data:

networks:
  denolith_network:
    name: denolith_network
