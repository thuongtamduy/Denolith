services:
  denolith_api:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DENO_ENV=production
      - DATABASE_URL=postgres://postgres:postgres@db:5432/denolith?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: denolith
    ports:
      - "127.0.0.1:5432:5432" # 🔒 Chỉ cho phép kết nối từ Localhost
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379" # 🔒 Chỉ cho phép kết nối từ Localhost
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
