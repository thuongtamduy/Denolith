route:
  receiver: "default-receiver"
  group_by: ["alertname"]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: "default-receiver"
    # Bạn có thể cấu hình Slack, Telegram hoặc Email ở đây.
    # Ví dụ với webhook giả lập hoặc log:
    webhook_configs:
      - url: "http://localhost:5001/" # Placeholder
