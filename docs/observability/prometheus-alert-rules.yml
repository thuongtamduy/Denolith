groups:
  - name: denolith-api-alerts
    interval: 30s
    rules:
      - alert: DenolithHigh5xxRateWarning
        expr: |
          (
            sum(rate(denolith_http_errors_total{error_class="5xx"}[5m])) /
            clamp_min(sum(rate(denolith_http_requests_total[5m])), 0.001)
          ) > 0.02
          and
          sum(rate(denolith_http_requests_total[5m])) > 1
        for: 10m
        labels:
          severity: warning
          service: denolith-api
        annotations:
          summary: "Denolith 5xx error rate is high (warning)"
          description: "5xx ratio is above 2% for at least 10 minutes with sustained traffic."

      - alert: DenolithHigh5xxRateCritical
        expr: |
          (
            sum(rate(denolith_http_errors_total{error_class="5xx"}[5m])) /
            clamp_min(sum(rate(denolith_http_requests_total[5m])), 0.001)
          ) > 0.05
          and
          sum(rate(denolith_http_requests_total[5m])) > 1
        for: 5m
        labels:
          severity: critical
          service: denolith-api
        annotations:
          summary: "Denolith 5xx error rate is high (critical)"
          description: "5xx ratio is above 5% for at least 5 minutes with sustained traffic."

      - alert: DenolithP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(denolith_http_request_duration_ms_bucket[5m])) by (le)
          ) > 1000
        for: 10m
        labels:
          severity: warning
          service: denolith-api
        annotations:
          summary: "Denolith p95 latency is high"
          description: "p95 latency is above 1000ms for at least 10 minutes."

      - alert: DenolithNoTraffic
        expr: sum(rate(denolith_http_requests_total[15m])) == 0
        for: 15m
        labels:
          severity: info
          service: denolith-api
        annotations:
          summary: "No traffic observed on Denolith API"
          description: "No HTTP traffic seen in the last 15 minutes."
